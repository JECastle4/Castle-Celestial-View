name: Release - Build & Publish

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # ── Python setup (done here so tomllib is available for version validation) ──
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      # ── Version validation ────────────────────────────────────────────────
      - name: Validate version synchronisation
        run: |
          API_VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          FE_VERSION=$(python3 -c "import json; print(json.load(open('frontend/package.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "API version:      $API_VERSION"
          echo "Frontend version: $FE_VERSION"
          echo "Tag version:      $TAG_VERSION"

          if [ "$API_VERSION" != "$FE_VERSION" ]; then
            echo "::error::Version mismatch — pyproject.toml ($API_VERSION) and package.json ($FE_VERSION) must match."
            exit 1
          fi
          if [ "$API_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($API_VERSION). Update both version files before tagging."
            exit 1
          fi
          echo "Versions consistent: $API_VERSION"

      # ── Python build ──────────────────────────────────────────────────────
      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build Python wheel
        run: python -m build

      - name: Verify wheel excludes dev locale
        run: |
          WHL=$(ls dist/*.whl)
          if unzip -l "$WHL" | grep -q "xx-reverse"; then
            echo "::error::Dev locale xx-reverse.json found in wheel — aborting release."
            exit 1
          fi
          echo "Wheel is clean: $WHL"

      # ── Frontend build ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Verify frontend dist excludes dev locale
        run: |
          if grep -rq "xx-reverse" frontend/dist/; then
            echo "::error::Dev locale xx-reverse found in frontend dist — aborting release."
            exit 1
          fi
          echo "Frontend dist is clean."

      - name: Archive frontend dist
        run: |
          cd frontend
          zip -r ../dist/castle-celestial-view-frontend-${GITHUB_REF_NAME}.zip dist/
          echo "Archived frontend/dist to dist/castle-celestial-view-frontend-${GITHUB_REF_NAME}.zip"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Castle Celestial View ${{ github.ref_name }}
          draft: true
          generate_release_notes: false
          body: |
            ## Castle Celestial View ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/JECastle4/Castle-Celestial-View/blob/${{ github.ref_name }}/CHANGELOG.md) for what changed in this release.

            ### QA Attestation
            <!-- Fill in links to QA evidence before publishing -->
            | Area | Status | Evidence |
            |------|--------|----------|
            | Automated tests | | |
            | Security scan | | |
            | Accessibility audit | | |
            | Licence audit | | |
            | Production build verification | ✅ Verified by CI | Artifact names below |
            | Manual acceptance | | |

            ### Artifacts
            - `astronomy_tools-*.whl` — Python API wheel (install with `pip install astronomy_tools-*.whl`)
            - `castle-celestial-view-frontend-*.zip` — Frontend static dist (serve via any HTTP server)
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/castle-celestial-view-frontend-*.zip
